services:
  web:
    build:
      context: .
      target: deps
    command: sh -c "npm run migrate:up && npm run dev"
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-insecure-secret-change-me}
      DATABASE_URL: postgresql://app:app@postgres:5432/app
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
